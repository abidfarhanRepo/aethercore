version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aether-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-aether}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aether_dev_password}
      POSTGRES_DB: ${DB_NAME:-aether_pos}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aether} -d ${DB_NAME:-aether_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aether-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aether-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aether-network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: aether-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aether-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aether-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-aether}:${DB_PASSWORD:-aether_dev_password}@postgres:5432/${DB_NAME:-aether_pos}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_key_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_key_change_in_prod}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3000}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - node_modules_backend:/app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aether-network
    restart: unless-stopped
    command: sh -c "npm run migrate:dev && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aether-frontend
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - node_modules_frontend:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - aether-network
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  node_modules_backend:
  node_modules_frontend:

networks:
  aether-network:
    driver: bridge
