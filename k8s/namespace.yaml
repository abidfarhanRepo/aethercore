---
# Namespace for Aether POS application
apiVersion: v1
kind: Namespace
metadata:
  name: aether-pos
  labels:
    name: aether-pos
    managed-by: kubernetes

---
# Resource Quota for namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aether-pos-quota
  namespace: aether-pos
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "100"
    services: "20"
    persistentvolumeclaims: "10"

---
# Network Policy - Restrict ingress to namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aether-pos-default-deny
  namespace: aether-pos
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: aether-pos

---
# Network Policy - Allow frontend to backend communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aether-pos-backend-allow
  namespace: aether-pos
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 4000
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 5000

---
# Network Policy - Allow backend to database communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aether-pos-database-allow
  namespace: aether-pos
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 5432

---
# Network Policy - Allow backend to redis communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aether-pos-redis-allow
  namespace: aether-pos
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 6379
