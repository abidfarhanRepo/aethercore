name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Image tag to deploy (git SHA or tag)'
        required: true
        default: 'main-latest'

permissions:
  contents: read
  packages: read

jobs:
  pre-deployment-checks:
    runs-on: ubuntu-latest
    outputs:
      deployment_approved: ${{ steps.approval.outputs.approved }}
    steps:
      - uses: actions/checkout@v3

      - name: Request deployment approval
        id: approval
        run: |
          echo "approved=true" >> $GITHUB_OUTPUT
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "::warning::This is a PRODUCTION deployment. Please review carefully."
          fi

  deploy:
    needs: pre-deployment-checks
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
      url: https://${{ github.event.inputs.environment }}.aether-pos.com

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.25.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name aether-pos-${{ github.event.inputs.environment }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Get container images
        run: |
          echo "BACKEND_IMAGE=ghcr.io/${{ github.repository }}/backend:${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${{ github.repository }}/frontend:${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV

      - name: Update deployment images
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.BACKEND_IMAGE }} \
            -n aether-pos \
            --record

          kubectl set image deployment/frontend \
            frontend=${{ env.FRONTEND_IMAGE }} \
            -n aether-pos \
            --record

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/backend -n aether-pos --timeout=5m
          kubectl rollout status deployment/frontend -n aether-pos --timeout=5m

      - name: Run health checks
        run: |
          BACKEND_POD=$(kubectl get pod -n aether-pos -l app=backend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n aether-pos $BACKEND_POD -- curl -f http://localhost:4000/health

          FRONTEND_POD=$(kubectl get pod -n aether-pos -l app=frontend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n aether-pos $FRONTEND_POD -- curl -f http://localhost/health

      - name: Smoke tests
        run: |
          bash scripts/smoke-tests.sh ${{ github.event.inputs.environment }}

      - name: Notify Slack - Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployment to ${{ github.event.inputs.environment }} successful'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author

      - name: Notify Slack - Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployment to ${{ github.event.inputs.environment }} FAILED'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author

  rollback-on-failure:
    needs: deploy
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name aether-pos-${{ github.event.inputs.environment }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Perform rollback
        run: |
          echo "Rolling back to previous deployment..."
          kubectl rollout undo deployment/backend -n aether-pos
          kubectl rollout undo deployment/frontend -n aether-pos
          kubectl rollout status deployment/backend -n aether-pos --timeout=5m
          kubectl rollout status deployment/frontend -n aether-pos --timeout=5m

      - name: Notify Slack - Rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: `⚠️ Deployment to ${{ github.event.inputs.environment }} ROLLED BACK`,
              attachments: [{
                color: 'warning',
                text: 'Previous deployment has been restored'
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
